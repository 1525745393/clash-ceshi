# 软路由专用 (精简注释版)
# 功能：国内外 DNS 分流、防泄露污染、NAS 兼容
# 适配：OpenClash Meta 内核, Fake-IP (TUN) 模式

[General]
CORE_TYPE = Meta
EN_MODE = fake-ip-tun
PROXY_MODE = rule
STACK_TYPE = gvisor
RESTART = true

# IPv6 设置 (已关闭)
IPV6_ENABLE = 0
IPV6_DNS = 0
CHINA_IP6_ROUTE = 0

# DNS 基础设置 (对齐 198.20.0.1)
ENABLE_REDIRECT_DNS = 1
ENABLE_CUSTOM_DNS = 1
APPEND_DEFAULT_DNS = 0
APPEND_WAN_DNS = 0
STORE_FAKEIP = 1
FAKEIP_RANGE = 198.20.0.1/16
CUSTOM_FAKEIP_FILTER = 1
CUSTOM_FAKEIP_FILTER_MODE = blacklist
ENABLE_RESPECT_RULES = 1
CUSTOM_FALLBACK_FILTER = 1

# 中国环境优化
CHINA_IP_ROUTE = 1
DISABLE_UDP_QUIC = 1
INTRANET_ALLOWED = 1
ROUTER_SELF_PROXY = 1

# Meta 内核优化
ENABLE_TCP_CONCURRENT = 1
ENABLE_UNIFIED_DELAY = 1
GLOBAL_CLIENT_FINGERPRINT = chrome

# 自动更新与嗅探
CHNR_AUTO_UPDATE = 1
GEOIP_AUTO_UPDATE = 1
GEOSITE_AUTO_UPDATE = 1
ENABLE_META_SNIFFER = 1
ENABLE_META_SNIFFER_CUSTOM = 1
ENABLE_META_SNIFFER_PURE_IP = 1

[Overwrite]
# DNS 核心逻辑覆写
ruby_map_edit "$CONFIG_FILE" "['dns']" "['enable']" "true"
ruby_map_edit "$CONFIG_FILE" "['dns']" "['ipv6']" "false"
ruby_map_edit "$CONFIG_FILE" "['dns']" "['enhanced-mode']" "fake-ip"
ruby_map_edit "$CONFIG_FILE" "['dns']" "['fake-ip-range']" "198.20.0.1/16"
ruby_map_edit "$CONFIG_FILE" "['dns']" "['listen']" "0.0.0.0:7874"

# 1. 国内 DNS (nameserver)
ruby_map_edit "$CONFIG_FILE" "['dns']" "['nameserver']" "['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']"

# 2. 国外 DNS (fallback)
ruby_map_edit "$CONFIG_FILE" "['dns']" "['fallback']" "['https://dns.google/dns-query', 'https://1.1.1.1/dns-query', 'tls://8.8.8.8', 'tls://1.1.1.1']"

# 3. 节点域名解析
ruby_map_edit "$CONFIG_FILE" "['dns']" "['proxy-server-nameserver']" "['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']"

# 4. 域名分流策略 (NAS & Apple-CN)
ruby_map_edit "$CONFIG_FILE" "['dns']" "['nameserver-policy']" "{'geosite:cn': ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query'], 'geosite:geolocation-cn': ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query'], 'geosite:apple-cn': ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query'], 'domain:synology.me': ['119.29.29.29', '223.5.5.5'], 'domain:myqnapcloud.com': ['119.29.29.29', '223.5.5.5'], 'domain:quickconnect.to': ['119.29.29.29', '223.5.5.5']}"

# 5. 防泄露逻辑
ruby_map_edit "$CONFIG_FILE" "['dns']" "['fallback-filter']" "['geoip']" "true"
ruby_map_edit "$CONFIG_FILE" "['dns']" "['geoip-code']" "CN"
ruby_map_edit "$CONFIG_FILE" "['dns']" "['ipcidr']" "['240.0.0.0/4']"

# 6. Fake-IP 过滤 (对齐原配置特殊域名)
ruby_map_edit "$CONFIG_FILE" "['dns']" "['fake-ip-filter']" "['+.lan', '+.local', 'geosite:cn', '+.synology.me', '+.myqnapcloud.com', '+.quickconnect.to', '+.km688.ink', '+.onesubv.site', '+.oneyyds.online', '+.xiaoniuyun.cc', '+.apple-bing.sbs', '+.ynhtbank.com', '+.qeayr.cn', '+.saojc.xyz', '+.dler.cloud', '+.aerianas.top', '+.wxda.net', 'localhost']"
